pid_file /run/mosquitto/mosquitto.pid

# Persistence
persistence true
persistence_location /mosquitto/data/

# MQTT (native)
listener 1883
protocol mqtt

# WebSocket - 모든 프론트엔드 (AI Assistant, Screen, Robot Pose)
listener 9001
protocol websockets

# Allow anonymous connections
allow_anonymous true

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
